Outputs:
  ApiUrl:
    Description: The URL of the API
    Value: !Sub https://${GraphQLApi.GraphQLDns}/graphql
  ApiKey:
    Description: The Public API key of the API
    Value: !GetAtt GraphQLApiPublicKey.ApiKey
