AWSTemplateFormatVersion: 2010-09-09
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31
Description: The backend REST API for the website

Parameters:
  ProjectName:
    Type: String
  CognitoUserPoolId:
    Type: String
    Description: The Cognito UserPool ID
  CognitoUserPoolClientId:
    Type: String
    Description: ID of the User Pool Client to authorize

Globals:
  Function:
    Runtime: provided.al2023
    MemorySize: 128
    Timeout: 30
    Handler: rust.handler
    Architectures:
      - arm64
    Environment:
      Variables:
        BACKEND_TABLE_NAME: !Ref BackendTable
        RUST_LOG: debug,hyper=info,h2=info,tracing=info,aws_config=info,aws_smithy_runtime=info,aws_smithy_runtime_api=info,rustls=info

Mappings:
  AppSyncResolvers:
    Rust:
      Query: [gameState]
      Mutation:
        [
          startGame,
          stopGame,
          resetGame,
          registerNewPlayer,
          updatePlayerName,
          removePlayer,
          clickRust,
          reportLatencyRust,
        ]
      Subscription: [updatedPlayer, removedPlayer, updatedGameStatus]

Resources:
  ##################################
  # Rust AppSync GraphQL Resolvers #
  ##################################
  "Fn::ForEach::RustOps":
    - OpType
    - [Query, Mutation, Subscription]
    - "Fn::ForEach::Op":
        - Op
        - !FindInMap [AppSyncResolvers, Rust, !Ref OpType]
        - "Rust${OpType}${Op}Resolver":
            Type: AWS::AppSync::Resolver
            DependsOn: GraphQLApiSchema
            Properties:
              ApiId: !GetAtt GraphQLApi.ApiId
              DataSourceName: !GetAtt LambdaDatasource.Name
              Kind: UNIT
              TypeName: !Ref OpType
              FieldName: !Ref Op
              MaxBatchSize: 100
              MetricsConfig: ENABLED
  ################################
  # JS AppSync GraphQL Resolvers #
  ################################
  JsGetGameStatusFunction:
    Type: AWS::AppSync::FunctionConfiguration
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Name: JsGetGameStatus
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location: ../graphql/js/get_game_status.req.js
      DataSourceName: !GetAtt BackendTableDatasource.Name
      MaxBatchSize: 100
  JsGetPlayerFunction:
    Type: AWS::AppSync::FunctionConfiguration
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Name: JsGetPlayer
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location: ../graphql/js/get_player.req.js
      DataSourceName: !GetAtt BackendTableDatasource.Name
      MaxBatchSize: 100
  JsUpdateClickFunction:
    Type: AWS::AppSync::FunctionConfiguration
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Name: JsUpdateClick
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location: ../graphql/js/update_click.req.js
      DataSourceName: !GetAtt BackendTableDatasource.Name
      MaxBatchSize: 100
  JsUpdateLatencyFunction:
    Type: AWS::AppSync::FunctionConfiguration
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Name: JsUpdateLatency
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location: ../graphql/js/update_latency.req.js
      DataSourceName: !GetAtt BackendTableDatasource.Name
      MaxBatchSize: 100

  JsMutationclickJsResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLApiSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Kind: PIPELINE
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location: ../graphql/js/pipeline.js
      TypeName: Mutation
      FieldName: clickJs
      MaxBatchSize: 100
      MetricsConfig: ENABLED
      PipelineConfig:
        Functions:
          - !GetAtt JsGetGameStatusFunction.Name
          - !GetAtt JsUpdateClickFunction.Name
  JsMutationreportLatencyJsResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLApiSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Kind: PIPELINE
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location: ../graphql/js/pipeline.js
      TypeName: Mutation
      FieldName: reportLatencyJs
      MaxBatchSize: 100
      MetricsConfig: ENABLED
      PipelineConfig:
        Functions:
          - !GetAtt JsGetGameStatusFunction.Name
          - !GetAtt JsGetPlayerFunction.Name
          - !GetAtt JsUpdateLatencyFunction.Name

  #################
  # Backend table #
  #################
  BackendTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ProjectName}-backend
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: True

  ###############
  # GraphQL API #
  ###############
  GraphQLApiPublicKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Description: Public Access Key to the API embedded in the front website
      Expires: 1744236000 # 2025-04-09 22:00:00 TZ=Paris
  GraphQLApiSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      DefinitionS3Location: ../graphql/schema.gql
  GraphQLApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      ApiType: GRAPHQL
      Name: !Ref ProjectName
      Visibility: GLOBAL
      AuthenticationType: AMAZON_COGNITO_USER_POOLS
      UserPoolConfig:
        UserPoolId: !Ref CognitoUserPoolId
        AwsRegion: !Ref AWS::Region
        AppIdClientRegex: !Sub ^${CognitoUserPoolClientId}$
        DefaultAction: ALLOW
      AdditionalAuthenticationProviders:
        - AuthenticationType: API_KEY
      IntrospectionConfig: ENABLED
      QueryDepthLimit: 0 # Unlimited
      ResolverCountLimit: 10000 # 10000
      XrayEnabled: true
      LogConfig:
        CloudWatchLogsRoleArn: !GetAtt GraphQLApiLogRole.Arn
        ExcludeVerboseContent: false
        FieldLogLevel: ALL
      # EnhancedMetricsConfig:
      #   OperationLevelMetricsConfig: ENABLED
      #   DataSourceLevelMetricsBehavior: FULL_REQUEST_DATA_SOURCE_METRICS
      #   ResolverLevelMetricsBehavior: FULL_REQUEST_RESOLVER_METRICS
      # EnvironmentVariables:
      #   Key: Value
  GraphQLApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/appsync/apis/${GraphQLApi.ApiId}
      RetentionInDays: 14
  GraphQLApiLogRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub gql-${ProjectName}-log
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Path: /
  GraphQLApiLogRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      Roles:
        - !Ref GraphQLApiLogRole
      PolicyName: cloudwatch
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !GetAtt GraphQLApiLogGroup.Arn
  ################
  # Data Sources #
  ################
  BackendTableDatasource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Type: AMAZON_DYNAMODB
      Name: backend_table
      DynamoDBConfig:
        AwsRegion: !Ref AWS::Region
        TableName: !Ref BackendTable
        UseCallerCredentials: false
      ServiceRoleArn: !GetAtt BackendTableDatasourceRole.Arn
  BackendTableDatasourceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub gql-${ProjectName}-dynamodb-access
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Path: /
  AppsyncSourceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-appsync-source
      CodeUri: ../rust/lambdas/appsync-source
      Role: !GetAtt AppsyncSourceFunctionRole.Arn
  AppsyncSourceFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AppsyncSourceFunction}
      RetentionInDays: 90
  AppsyncSourceFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub lambda-${ProjectName}-dynamodb-access
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Path: /
  AppsyncSourceFunctionRoleBasicPolicy:
    Type: AWS::IAM::Policy
    Properties:
      Roles:
        - !Ref AppsyncSourceFunctionRole
      PolicyName: basic-lambda
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !GetAtt AppsyncSourceFunctionLogGroup.Arn
  BackendTableAccessRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      Roles:
        - !Ref AppsyncSourceFunctionRole
        - !Ref BackendTableDatasourceRole
      PolicyName: dynamodb
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: FullDataAccess
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:BatchGetItem
              - dynamodb:BatchWriteItem
              - dynamodb:ConditionCheckItem
            Resource:
              - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${BackendTable}
              - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${BackendTable}/index/*
  LambdaDatasource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Type: AWS_LAMBDA
      Name: lambda_source
      LambdaConfig:
        LambdaFunctionArn: !GetAtt AppsyncSourceFunction.Arn
      ServiceRoleArn: !GetAtt LambdaDatasourceRole.Arn
  LambdaDatasourceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub gql-${ProjectName}-datasource-lambda
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: invoke-lambda
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt AppsyncSourceFunction.Arn
      Path: /

